name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: labelize
            artifact: labelize-x86_64-unknown-linux-gnu.tar.gz
            package: tar
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: labelize
            artifact: labelize-aarch64-apple-darwin.tar.gz
            package: tar
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: labelize
            artifact: labelize-x86_64-apple-darwin.tar.gz
            package: tar
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: labelize.exe
            artifact: labelize-x86_64-pc-windows-msvc.zip
            package: zip
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --features serve --target ${{ matrix.target }}
      - name: Package (tar.gz)
        if: matrix.package == 'tar'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }} ${{ matrix.binary }}
      - name: Package (zip)
        if: matrix.package == 'zip'
        shell: pwsh
        run: |
          Push-Location target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.binary }} -DestinationPath ../../../${{ matrix.artifact }}
          Pop-Location
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v6
        with:
          path: artifacts
      - name: Generate checksums
        # download-artifact nests each file under artifacts/<name>/<file>,
        # where <name> equals the file name. Flatten so checksums.txt lists
        # the bare archive name (e.g. "...  labelize-x86_64-unknown-linux-gnu.tar.gz").
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec sha256sum {} \; \
            | awk '{ hash=$1; $1=""; sub(/^ +/,""); n=split($0, parts, "/"); print hash "  " parts[n] }' \
            | sort -k2 \
            > checksums.txt
          cat checksums.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/checksums.txt

  crates-io:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    # Only publish stable releases (vX.Y.Z), not prereleases like v1.0.0-rc.1.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  homebrew:
    name: Update Homebrew Tap
    needs: crates-io
    runs-on: ubuntu-latest
    # Only update the tap for stable releases (vX.Y.Z).
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: artifacts
      - name: Compute SHA256 sums
        id: sha
        run: |
          echo "linux_x64=$(sha256sum artifacts/labelize-x86_64-unknown-linux-gnu.tar.gz/labelize-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "mac_arm64=$(sha256sum artifacts/labelize-aarch64-apple-darwin.tar.gz/labelize-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "mac_x64=$(sha256sum artifacts/labelize-x86_64-apple-darwin.tar.gz/labelize-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Update Homebrew tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: GOODBOY008/homebrew-labelize
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ github.ref_name }}",
              "linux_x64_sha256": "${{ steps.sha.outputs.linux_x64 }}",
              "mac_arm64_sha256": "${{ steps.sha.outputs.mac_arm64 }}",
              "mac_x64_sha256": "${{ steps.sha.outputs.mac_x64 }}"
            }
